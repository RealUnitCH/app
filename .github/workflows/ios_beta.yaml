name: Build & Upload iOS Beta

on:
  workflow_dispatch:
  push:
    branches:
      - feat/fastlane

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ------------------------------------
      # 1. Setup Environment
      # ------------------------------------
      
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'

      - name: 📦 Install Flutter Dependencies
        run: flutter pub get

      # ------------------------------------
      # 2. Setup Fastlane
      # ------------------------------------
      
      - name: 💎 Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false
      
      - name: Install Bundler
        run: gem install bundler -v 2.7.2
      
      - name: Install Gems
        run: bundle _2.7.2_ install
        working-directory: ios

      # ------------------------------------
      # 3. Build & Deploy
      # ------------------------------------

      - name: 🚀 Run Fastlane Deployment Lane
        run: bundle exec fastlane beta
        working-directory: ios
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APP_SPECIFIC_PASSWORD }}

      - name: ✅ Deployment Complete
        run: echo "Successfully triggered Fastlane lane beta"

