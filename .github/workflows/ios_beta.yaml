name: Build & Upload iOS Beta

on:
  workflow_dispatch:
  push:
    branches:
      - feat/fastlane

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Setup SSH access for Fastlane Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_KEY }}
          host-name: github.com  

      - name: Build and deploy iOS app
        uses: Ifoegbu1/flutter-fastlane-action@main
        with:
          platform: "ios"
          bundleIdentifier: "swiss.dfx.realunit"
          iosBuildArgs: "--dart-define=ENVIRONMENT=production"
          iosDistributionJson: ${{ secrets.IOS_DISTRIBUTION_JSON }}
          withCache: "true" # Enable caching for faster builds
