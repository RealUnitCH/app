name: Build & Upload iOS Beta

on:
  workflow_dispatch:
  push:
    branches:
      - feat/fastlane

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ------------------------------------
      # 1. Setup Environment
      # ------------------------------------
      
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'

      - name: 📦 Install Flutter Dependencies
        run: flutter pub get

      # ------------------------------------
      # 2. Setup Fastlane & Signing Secrets
      # ------------------------------------
      
      - name: 💎 Set up Ruby and Install Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      # ------------------------------------
      # 3. Build & Deploy
      # ------------------------------------

      - name: 🛠️ Build Flutter iOS App
        run: flutter build ipa 
      
      - name: 🚀 Run Fastlane Deployment Lane
        run: |
          cd ios
          bundle exec fastlane beta
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APP_SPECIFIC_PASSWORD }}

      - name: ✅ Deployment Complete
        run: echo "Successfully triggered Fastlane lane beta"

