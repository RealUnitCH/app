name: Develop Beta Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-beta*"

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      # -------------------
      # Setup Environment
      # -------------------

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: android-actions/setup-android@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Init GoMobile
        run: |
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
        working-directory: ${{ github.workspace }}

      - name: Decode Secrets
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          STORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat <<EOF > android/key.properties
          storeFile=upload-keystore.jks
          storePassword=$STORE_PWD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PWD
          EOF

      - name: Install Flutter Dependencies
        run: |
          flutter pub get
          dart run tool/generate_localization.dart
          dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ github.workspace }}

      # -------------------
      # Build APK
      # -------------------

      - name: Extract version
        id: version
        run: |
          VERSION_NAME="${{ github.ref_name }}"
          VERSION_NAME="${VERSION_NAME#v}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --build-name=${{ steps.version.outputs.version_name }} \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/debug_info

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/realunit-${{ steps.version.outputs.version_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/realunit-*.apk

  github-release:
    needs: [android-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.0.1
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## Features",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## Refactor",
                  "labels": ["refactor"]
                },
                {
                  "title": "## Others",
                  "labels": ["chore"]
                },
                {
                  "title": "## Not labelled",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "method": "match",
                  "pattern": "^([\\w\\-]+)",
                  "target": "$1",
                  "on_property": "title"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: realunit-*.apk
          generate_release_notes: false
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
