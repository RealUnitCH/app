name: Golden Bootstrap

# Temporary workflow — runs `flutter test test/goldens --update-goldens` on
# the dfx01 self-hosted runner and uploads the regenerated PNGs as an
# artifact, so a maintainer can download + rsync + commit them.
#
# To be deleted from this branch in the same PR before ready-for-review.
# See docs/visual-regression-tests.md and
# DFXServer/server/infrastructure/dfx01/actions-runners/golden-tests-recipe.md.

on:
  push:
    branches: [fix/goldens-load-assets]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: golden-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Regenerate golden baselines
    runs-on: [self-hosted, macOS, ARM64, m3-ultra, realunit-app]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: dart run tool/generate_localization.dart
      - run: dart run tool/generate_release_info.dart
      - run: flutter pub run build_runner build
      - name: Regenerate goldens
        run: flutter test test/goldens --update-goldens
      - name: Upload regenerated baselines
        uses: actions/upload-artifact@v4
        with:
          name: golden-baselines
          path: test/goldens/**/goldens/**
          if-no-files-found: error
