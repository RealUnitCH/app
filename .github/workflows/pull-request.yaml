name: RealUnit Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - trunk

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
      - run: flutter pub get
      - run: dart run tool/generate_localization.dart
      - run: flutter pub run build_runner build
      - run: flutter test
