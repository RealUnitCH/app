name: Auto Tag on Merge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest tag
        id: get-tag
        run: |
          # Get the latest tag matching v* pattern, sorted by version
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found, starting with v0.0.0"
            LATEST_TAG="v0.0.0"
          fi

          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "::notice::Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: next-version
        run: |
          LATEST_TAG="${{ steps.get-tag.outputs.latest_tag }}"

          # Remove 'v' prefix and split into parts
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "::notice::New tag: $NEW_TAG"

      - name: Create and push tag
        run: |
          NEW_TAG="${{ steps.next-version.outputs.new_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          echo "::notice::Created and pushed tag: $NEW_TAG"
