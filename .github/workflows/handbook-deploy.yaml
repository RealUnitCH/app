name: Handbook CI/CD

# Single deploy pipeline for the handbook image: every push to `develop`
# (with handbook-relevant paths) builds the image once and rolls it out
# to BOTH the DEV and PRD endpoints sequentially. PRD only runs when DEV
# finishes green, so a broken handbook can't reach production.
#
# This is a deliberate dev/prd-coupling exception scoped to the handbook
# alone — the wallet app itself still follows the strict develop→main
# separation.
#
# All build/deploy/smoke logic lives in the reusable workflow
# .github/workflows/handbook.yaml. This file only wires the per-env
# parameters and the DEV-must-pass ordering.

on:
  push:
    branches: [develop]
    paths:
      - "docs/handbook/**"
      - "Dockerfile.handbook"
      - "handbook.nginx.conf"
      - "handbook.htpasswd"
      - ".github/workflows/handbook-deploy.yaml"
      - ".github/workflows/handbook.yaml"
  workflow_dispatch:
  # The api repo triggers this workflow whenever the RealUnit mail templates,
  # the German i18n strings, or the generator script change on its develop
  # branch (see DFXswiss/api/.github/workflows/notify-handbook-on-mail-change.yaml).
  # The handbook reusable workflow re-pulls api@develop at build time and
  # bakes the freshly generated mail previews into the image, so a change
  # over there flows into both DEV and PRD handbook deployments without a
  # manual sync PR. Single source of truth = api repo.
  repository_dispatch:
    types: [mails-updated]

permissions:
  contents: read

# Serialize handbook deploys so a manual workflow_dispatch can't race a
# concurrent develop push: both would build :beta in parallel, the later
# build would win on Docker Hub, and dfxdev / dfxprd could end up pulling
# different images depending on timing. cancel-in-progress is false so a
# mid-rollout deploy is never killed (we'd otherwise risk leaving DEV
# halfway through and PRD never started).
concurrency:
  group: handbook-deploy
  cancel-in-progress: false

jobs:
  deploy-dev:
    uses: ./.github/workflows/handbook.yaml
    with:
      environment: DEV
      docker_tag: dfxswiss/realunit-app-handbook:beta
      smoke_url: https://dev-handbook.realunit.app/healthz
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_DEV_SSH_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_DEV_SSH_KNOWN_HOSTS }}
      DEPLOY_USER: ${{ secrets.DEPLOY_DEV_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_DEV_HOST }}
      # Needed to clone DFXswiss/api at build time for the mail-preview
      # generation step in handbook.yaml.
      API_REPO_TOKEN: ${{ secrets.API_REPO_TOKEN }}

  deploy-prd:
    needs: deploy-dev
    uses: ./.github/workflows/handbook.yaml
    with:
      environment: PRD
      docker_tag: dfxswiss/realunit-app-handbook:beta
      smoke_url: https://handbook.realunit.app/healthz
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_PRD_SSH_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_PRD_SSH_KNOWN_HOSTS }}
      DEPLOY_USER: ${{ secrets.DEPLOY_PRD_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_PRD_HOST }}
      # Needed to clone DFXswiss/api at build time for the mail-preview
      # generation step in handbook.yaml.
      API_REPO_TOKEN: ${{ secrets.API_REPO_TOKEN }}
