name: Deploy Android Beta

on:
  push:
    tags:
      - "android/v*"
    branches:
      - "feat/fastlane-android"


jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: |
          flutter pub get
          dart run tool/generate_localization.dart
          dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ github.workspace }}
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Init GoMobile
        run: |
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
        working-directory: ${{ github.workspace }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: android

      - name: Install Bundler
        run: gem install bundler -v 2.7.2

      - name: Install Gems
        run: bundle _2.7.2_ install
        working-directory: android

      # 5. Recreate Secrets from Base64
      - name: Decode Secrets
        env:
          PLAY_STORE_JSON: ${{ secrets.PLAY_STORE_JSON_BASE64 }}
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$PLAY_STORE_JSON" | base64 --decode > android/fastlane/credentials.json
          echo "$ANDROID_KEYSTORE" | base64 --decode > android/app/release-key.jks

      # 6. Run our beta lane
      - name: Deploy to Play Store Beta (Android)
        run: bundle exec fastlane beta
        working-directory: ./android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}