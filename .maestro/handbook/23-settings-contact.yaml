# Tier-3 navigation smoke. The handbook screenshot for this flow is the
# visual-regression Golden mapped in scripts/assemble-handbook-screenshots.sh;
# this flow's diagnostic capture lands in build/handbook-captures/23-settings-contact.png.
# Continues from 22-settings-dfx-documents (no clearState): tap back twice to
# return to the Settings menu, then open "Kontakt" -> SettingsContactPage.
#
# Settle target: the contact-page transition is identified by "Wallet-Adresse"
# (a settings-menu-only tile, absent on the contact page) disappearing while
# "Kontakt" becomes visible. This combination is independent of backend state
# and of any future tile-text or i18n tweaks.
#
# The first back tap gates on "Dokumente der Aktionariat AG" because that tile
# lives only on SettingsLegalDocumentsPage, cleanly marking arrival there.
# All three taps re-tap if Maestro/XCUITest silently drops one
# (mobile-dev-inc/maestro#3137); each gate stops its loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Dokumente der Aktionariat AG.*'
          commands:
            - tapOn:
                point: 8%,8%
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible: 'Einstellungen'
          commands:
            - tapOn:
                point: 8%,8%
                optional: true
- waitForAnimationToEnd
# Gate the "Kontakt" tap on "Wallet-Adresse" still being visible — i.e. we
# are still on the settings menu and the tap has not yet taken effect. Once
# we land on SettingsContactPage, "Wallet-Adresse" disappears from the tree
# and the loop stops re-tapping immediately.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: '.*Wallet-Adresse.*'
          commands:
            - tapOn:
                text: 'Kontakt'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible:
      text: '.*Wallet-Adresse.*'
    timeout: 30000
- extendedWaitUntil:
    visible: 'Kontakt'
    timeout: 30000
