# Captures docs/handbook/screenshots/24-terms.png
# Self-contained: launches fresh with clearState. On the HomePage splash the
# copy above the Start button is a TextSubstringHighlighting rich-text widget
# (lib/widgets/text_substring_highlighting.dart). The highlighted substring
# "Nutzungsbedingungen" is rendered through a WidgetSpan wrapped in
# `Semantics(identifier: 'home-terms-link', button: true)` so Maestro can
# target it deterministically by id on iOS — Flutter's Semantics `identifier`
# is what `tapOn: id:` matches against on the iOS accessibility tree.
#
# We previously coordinate-tapped a relative point inside the RichText body
# because the bare RichText + TapGestureRecognizer collapses into a single
# StaticText node that Maestro couldn't pick up by text. That tap was
# wrap-sensitive and got dropped by XCUITest on Apple Silicon + iOS 26
# (mobile-dev-inc/maestro#3137). With the dedicated Semantics node the tap
# is by id, so word-wrap variations no longer matter.
#
# The closing assertion targets the LegalDocumentPage H1 "Nutzungsbedingungen
# der RealUnit Wallet App" — the bare word "Nutzungsbedingungen" also shows
# on the splash, so asserting it alone would pass even if the tap missed.
#
# The id-tap is still gated on the terms document not yet showing and re-tapped
# if it was silently dropped. The gate stops the loop the instant the document
# opens, so surplus iterations no-op.
appId: swiss.realunit.app
---
- launchApp:
    appId: swiss.realunit.app
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: 'Start'
    timeout: 30000
# Anchor that the full splash paragraph (not just the Start button) is on
# screen before the id-tap — without this guard Maestro can fire during the
# splash-image fade-in while the RichText is still painting.
- extendedWaitUntil:
    visible:
      text: '.*Mit der Nutzung dieser App.*'
    timeout: 10000
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Nutzungsbedingungen der RealUnit Wallet App.*'
          commands:
            - tapOn:
                id: 'home-terms-link'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Nutzungsbedingungen der RealUnit Wallet App.*'
    timeout: 30000
