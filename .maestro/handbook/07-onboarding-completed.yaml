# Tier-3 navigation smoke. The handbook screenshot for this flow is the
# visual-regression Golden mapped in scripts/assemble-handbook-screenshots.sh;
# this flow's diagnostic capture lands in build/handbook-captures/07-onboarding-completed.png.
# Wallet created — final onboarding confirmation screen "Ihre Wallet ist bereit".
#
# The tap is gated on the confirmation screen not yet showing and re-tapped if
# it was silently dropped (Maestro/XCUITest tap-loss on Apple Silicon + iOS 26,
# mobile-dev-inc/maestro#3137). The gate stops the loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible: 'Weiter'
          commands:
            - tapOn:
                text: 'Bestätigen'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: 'Weiter'
    timeout: 30000
