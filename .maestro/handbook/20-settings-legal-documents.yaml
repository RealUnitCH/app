# Captures docs/handbook/screenshots/20-settings-legal-documents.png
# Continues from 19-settings-seed-revealed (no clearState). The seed page is
# pushed on top of the Settings menu, so we tap back to the menu, then open
# "Rechtsdokumente" -> SettingsLegalDocumentsPage.
#
# Both taps (back to the settings list, then into the legal-documents screen)
# are gated on their target not yet showing and re-tapped if one was silently
# dropped (Maestro/XCUITest tap-loss on Apple Silicon + iOS 26,
# mobile-dev-inc/maestro#3137). Each gate stops its loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible: 'Einstellungen'
          commands:
            - tapOn:
                point: 8%,8%
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Dokumente der Aktionariat AG.*'
          commands:
            - tapOn:
                text: '.*Rechtsdokumente.*'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Dokumente der Aktionariat AG.*'
    timeout: 30000
