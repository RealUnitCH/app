# Captures docs/handbook/screenshots/21-settings-aktionariat-documents.png
# Continues from 20-settings-legal-documents. From SettingsLegalDocumentsPage
# tap the "Dokumente der Aktionariat AG" entry -> SettingsAktionariatDocumentsPage.
# The settle target is "Impressum", which is one of the four document tiles on
# the Aktionariat sub-page and is not present on SettingsLegalDocumentsPage.
#
# The tap is gated on the Aktionariat sub-page not yet showing and re-tapped
# if it was silently dropped (Maestro/XCUITest tap-loss on Apple Silicon +
# iOS 26, mobile-dev-inc/maestro#3137). The gate stops the loop the instant
# the screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Impressum.*'
          commands:
            - tapOn:
                text: '.*Dokumente der Aktionariat AG.*'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Impressum.*'
    timeout: 30000
