# Tier-3 navigation smoke. The handbook screenshot for this flow is the
# visual-regression Golden mapped in scripts/assemble-handbook-screenshots.sh;
# this flow's diagnostic capture lands in build/handbook-captures/25-restore-wallet.png.
# Continues from 24-settings-delete-wallet (no clearState): the
# SettingsConfirmLogoutWalletSheet modal is showing. We complete the
# reset here — tick the "Ich habe meine Wiederherstellungsphrase
# gesichert." checkbox (which enables the disabled "Zurücksetzen" button), then
# tap "Zurücksetzen". Confirming the reset wipes the wallet and drops the app
# back to onboarding (welcome).
#
# From there we walk the restore path: from the HomePage splash tap "Start"
# -> WelcomePage, tap the Software-Wallet card to flip the welcome toggle
# to step 2, then tap the Wallet-wiederherstellen card -> RestoreWalletPage.
# The settle target is the seed-entry description text, which is unique to
# RestoreWalletView (the "Wallet wiederherstellen" heading shares its string
# with the welcome card and would match too early).
#
# Welcome cards are targeted by Semantics id (see
# lib/screens/welcome/welcome_page.dart) instead of regex text-matching of
# their titles. Both step groups stay in the widget tree at all times —
# AnimatedSlide translates the off-screen group out of view but doesn't
# remove it from the semantic tree — so regex text checks against card
# titles match off-screen widgets and break `notVisible` gates. The id
# targets are stable across copy refreshes and animation half-states, and
# use the same pattern as the `wallet-logout-confirm-checkbox` and
# `home-terms-link` Semantics ids elsewhere in the app.
#
# The checkbox is now wrapped in `Semantics(identifier:
# 'wallet-logout-confirm-checkbox', toggled: …)` with a row-wide opaque
# GestureDetector (see
# lib/screens/settings/widgets/settings_confirm_logout_wallet_sheet.dart)
# so Maestro can target it deterministically via `tapOn: id:` instead of the
# previous wrap-sensitive `leftOf:` coordinate-tap that XCUITest silently
# dropped on Apple Silicon + iOS 26 (mobile-dev-inc/maestro#3137) — that
# silent loss is what caused the prior run to never check the box, leaving
# "Zurücksetzen" disabled and every downstream step a no-op against the still
# visible modal. We tap the checkbox once by id (a single deterministic
# Semantics target with a full-row tap surface), then gate the "Zurücksetzen"
# button tap on the modal still being visible — if "Zurücksetzen" was silently
# dropped we re-tap until the modal closes. We deliberately do not loop the
# checkbox itself: tapping it twice would toggle it back off again, since
# the underlying `setState(() => isChecked = !isChecked)` is not idempotent.
# If the checkbox tap is the one that's silently dropped, the next
# `extendedWaitUntil notVisible "RealUnit Wallet zurücksetzen"` (with the
# Zurücksetzen button still disabled) fails loudly rather than passing silently
# downstream — and the same Semantics-id strategy that fixed flow 26's
# Nutzungsbedingungen-link tap has been reliable enough since.
#
# All tap-leading steps (Zurücksetzen, Start, Software-Wallet, Wallet
# wiederherstellen) are gated on their target not yet showing and re-tapped
# if one was silently dropped. Each gate stops its loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- tapOn:
    id: 'wallet-logout-confirm-checkbox'
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: '.*RealUnit Wallet zurücksetzen.*'
          commands:
            - tapOn:
                text: 'Zurücksetzen'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible:
      text: '.*RealUnit Wallet zurücksetzen.*'
    timeout: 15000
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              id: 'welcome-software-wallet'
          commands:
            - tapOn:
                text: 'Start'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              id: 'welcome-restore-wallet'
          commands:
            - tapOn:
                id: 'welcome-software-wallet'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Wiederherstellungs-Wörter.*'
          commands:
            - tapOn:
                id: 'welcome-restore-wallet'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Wiederherstellungs-Wörter.*'
    timeout: 30000
