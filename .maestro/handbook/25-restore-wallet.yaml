# Captures docs/handbook/screenshots/25-restore-wallet.png
# Continues from 24-settings-delete-wallet (no clearState): the
# SettingsConfirmLogoutWalletSheet modal is showing. We complete the
# termination here — tick the "Ich habe meine Wiederherstellungsphrase
# gesichert." checkbox (which enables the disabled "Abmelden" button), then
# tap "Abmelden". Confirming the logout wipes the wallet and drops the app
# back to onboarding (welcome).
#
# From there we walk the restore path: from the HomePage splash tap "Start"
# -> WelcomePage, tap the "Digitale Wallet (App)" card to flip the welcome
# toggle to step 2, then tap the "Wallet wiederherstellen" card
# -> RestoreWalletPage. The settle target is the seed-entry description text,
# which is unique to RestoreWalletView (the "Wallet wiederherstellen" heading
# shares its string with the welcome card and would match too early).
#
# The checkbox has no text/id of its own, so it is anchored relatively to the
# left of its label. All tap-leading steps (Abmelden, Start, Digitale Wallet,
# Wallet wiederherstellen) are gated on their target not yet showing and
# re-tapped if one was silently dropped (Maestro/XCUITest tap-loss on Apple
# Silicon + iOS 26, mobile-dev-inc/maestro#3137). Each gate stops its loop the
# instant the screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- tapOn:
    leftOf:
      text: '.*Wiederherstellungsphrase gesichert.*'
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: '.*Aus REALU Wallet abmelden.*'
          commands:
            - tapOn:
                text: 'Abmelden'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Digitale Wallet.*'
          commands:
            - tapOn:
                text: 'Start'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Wallet wiederherstellen.*'
          commands:
            - tapOn:
                text: '.*Digitale Wallet.*'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Wiederherstellungs-Wörter.*'
          commands:
            - tapOn:
                text: '.*Wallet wiederherstellen.*'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Wiederherstellungs-Wörter.*'
    timeout: 30000
