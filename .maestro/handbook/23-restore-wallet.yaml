# Captures docs/handbook/screenshots/23-restore-wallet.png
# Self-contained: launches fresh with clearState. From the HomePage splash tap
# "Start" -> WelcomePage. Tap the "Digitale Wallet (App)" card to flip the
# welcome toggle to step 2, then tap the "Wallet wiederherstellen" card
# -> RestoreWalletPage. The settle target is the seed-entry description text,
# which is unique to RestoreWalletView (the "Wallet wiederherstellen" heading
# shares its string with the welcome card and would match too early).
#
# All three taps (Start, Digitale Wallet, Wallet wiederherstellen) are gated
# on their target not yet showing and re-tapped if one was silently dropped
# (Maestro/XCUITest tap-loss on Apple Silicon + iOS 26,
# mobile-dev-inc/maestro#3137). Each gate stops its loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- launchApp:
    appId: swiss.realunit.app
    clearState: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Digitale Wallet.*'
          commands:
            - tapOn:
                text: 'Start'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Wallet wiederherstellen.*'
          commands:
            - tapOn:
                text: '.*Digitale Wallet.*'
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Wiederherstellungs-Wörter.*'
          commands:
            - tapOn:
                text: '.*Wallet wiederherstellen.*'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Wiederherstellungs-Wörter.*'
    timeout: 30000
