# Captures docs/handbook/screenshots/10-biometric-prompt.png
# Re-entering the same six 1s. After the PIN is confirmed the app shows a
# bottom-sheet asking whether to enable biometric unlock. On a clean simulator
# this is the screen between PIN confirm and dashboard.
appId: swiss.realunit.app
---
- repeat:
    times: 6
    commands:
      - tapOn: '1'
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: 'Überspringen'
    timeout: 15000
