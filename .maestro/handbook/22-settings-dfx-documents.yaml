# Tier-3 navigation smoke. The handbook screenshot for this flow is the
# visual-regression Golden mapped in scripts/assemble-handbook-screenshots.sh;
# this flow's diagnostic capture lands in build/handbook-captures/22-settings-dfx-documents.png.
# Continues from 21-settings-aktionariat-documents. Tap back to
# SettingsLegalDocumentsPage, then open the "Dokumente der DFX AG" entry
# -> SettingsDfxDocumentsPage. The settle target is "Allgemeine
# Geschäftsbedingungen", the DFX terms tile, which is unique to this sub-page.
#
# Both taps (back to the legal-documents list, then into the DFX sub-page)
# are gated on their target not yet showing and re-tapped if one was silently
# dropped (Maestro/XCUITest tap-loss on Apple Silicon + iOS 26,
# mobile-dev-inc/maestro#3137). Each gate stops its loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Dokumente der DFX AG.*'
          commands:
            - tapOn:
                point: 8%,8%
                optional: true
- waitForAnimationToEnd
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Allgemeine Geschäftsbedingungen.*'
          commands:
            - tapOn:
                text: '.*Dokumente der DFX AG.*'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Allgemeine Geschäftsbedingungen.*'
    timeout: 30000
