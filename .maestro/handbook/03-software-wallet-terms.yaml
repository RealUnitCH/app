# Tier-3 navigation smoke. The handbook screenshot for this flow is the
# visual-regression Golden mapped in scripts/assemble-handbook-screenshots.sh;
# this flow's diagnostic capture lands in build/handbook-captures/03-software-wallet-terms.png.
#
# The tap is gated on the next screen not yet showing and re-tapped if it
# was silently dropped (Maestro/XCUITest tap-loss on Apple Silicon + iOS 26,
# mobile-dev-inc/maestro#3137). The gate stops the loop the instant the
# screen changes, so surplus iterations no-op.
appId: swiss.realunit.app
---
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible:
              text: '.*Neue Wallet erstellen.*'
          commands:
            - tapOn:
                text: '.*Software-Wallet.*'
                optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '.*Neue Wallet erstellen.*'
    timeout: 30000
