# M-4 — Disconnect mid-sign + reconnect + assert resume-vs-restart.
#
# PROVES (Tier-3 only):
#   * When the BitBox is physically unpowered mid-sign (page 4 of 13),
#     the realunit-app surfaces the reconnect sheet within 30 s (not
#     a zombie state, not a silent hang).
#   * After re-pair the app makes a deliberate, surfaced choice
#     between "resume the sign at page 4" and "restart cleanly from
#     page 1" — and that choice is visible to the user (no silent
#     resume of a different sign session under the user's nose).
#   * The sign-queue is invalidated correctly: a queued page-5 confirm
#     does not fire against the freshly-paired session as if the old
#     one had succeeded.
#
# DOES NOT PROVE:
#   * BLE init-frame retransmit dedup (the radio link here is
#     hard-down, not toggling) — see M-3.
#   * Factory-reset detection across sessions — see M-6.
#
# REQUIRED-KEYS (TODO):
#   * Same key set as M-2 / M-3, plus:
#   * Key('maestro-bitbox-reconnect-sheet') on the bottom sheet shown
#     by `showBitboxReconnectSheet` in
#     lib/screens/hardware_connect_bitbox/show_bitbox_reconnect_sheet.dart.
#   * Key('maestro-sign-resume-or-restart') on the user-facing choice
#     widget that appears after re-pair if a sign was in flight.
#     (NOTE: this widget does not yet exist; see BLOCKED block below.)
#
# BLOCKED (partial):
#   The "deliberate resume-vs-restart choice" widget is NOT yet
#   implemented in realunit-app. Today the app silently drops the
#   in-flight sign on disconnect and a fresh user-initiated sign
#   starts from scratch. The audit's BL-019 + the lifecycle work in
#   §6.I tracks shipping this choice widget. Until it ships, this flow
#   asserts the WEAKER invariant: after re-pair, the app is in a clean
#   state (no zombie sign-in-flight) — and surfaces a journal-trackable
#   PRECONDITION-PARTIAL marker so we can tell green-without-resume
#   apart from green-with-resume in coverage reports.
#
# OPERATOR PRECONDITIONS:
#   * Operator standing next to the BitBox with the USB-C cable in
#     hand. The disconnect step is "unplug the BitBox at page 4". On
#     the BitBox 02 Nova, removing power is the only way to simulate
#     "user walked away from the device".
#   * Wallet pre-paired (M-1 happy path within the last 24 h).
#   * KYC not yet completed (so the 13-page sign actually fires).
#
# HARDWARE: BitBox 02 Nova + iOS device.
# EXPECTED RUNTIME: ~6 min.
# GATE: scheduled-daily.
appId: swiss.realunit.app
---
- launchApp:
    appId: swiss.realunit.app
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Überspringen"
    commands:
      - tapOn:
          text: "Überspringen"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*RealUnit kaufen.*"
    timeout: 30000

- tapOn:
    text: "RealUnit kaufen"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: ".*Betrag.*|.*Menge.*"
    commands:
      - assertVisible:
          text: "M-4-PRECONDITION-FAILED: KYC already completed; reset wallet to retry"

- extendedWaitUntil:
    visible:
      text: ".*Eröffnungsprozess.*|.*KYC.*|.*Registrierung.*"
    timeout: 60000

- tapOn:
    text: "Weiter"
    optional: true

# Confirm pages 1..3 normally. Operator presses the BitBox button each
# time.
- repeat:
    times: 3
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*bestätigen Sie.*BitBox.*|.*Anmeldung bestätigen.*"
          timeout: 60000
      - waitForAnimationToEnd

# Sitting on page 4 confirm hint. NOW the operator unpowers the BitBox.
- extendedWaitUntil:
    visible:
      text: ".*bestätigen Sie.*BitBox.*"
    timeout: 60000

- runScript: |
    echo "M-4: OPERATOR-UNPOWER-BITBOX page=4 ts=$(date -u +%s)"
    echo "M-4: operator must now physically remove the BitBox USB-C cable"
    # On a runner with the BitBox-CLI integration, a programmatic
    # `bitbox-cli power off` would go here. That CLI is not yet wired
    # to the runner (BL-017 blocker) -- documented in RUNNER.md.

# Wait up to 45 s for the app to surface the disconnect.
# The bitboxDisconnectedTitle string ("BitBox ist nicht verbunden") OR
# the reconnect sheet appears.
- extendedWaitUntil:
    visible:
      text: ".*BitBox.*nicht verbunden.*|.*Verbindung.*unterbrochen.*|.*BitBox erneut verbinden.*"
    timeout: 45000

# Operator powers the BitBox back on. The app should either:
#  (a) auto-detect the device returning and re-pair (target behaviour);
#  (b) require an explicit tap on "BitBox erneut verbinden" (current).
- runScript: |
    echo "M-4: OPERATOR-REPOWER-BITBOX ts=$(date -u +%s)"

- runFlow:
    when:
      visible:
        text: ".*BitBox erneut verbinden.*"
    commands:
      - tapOn:
          text: "BitBox erneut verbinden"
          optional: true

# Re-pair handshake.
- extendedWaitUntil:
    visible:
      text: ".*Code mit dem.*BitBox-Gerät.*"
    timeout: 60000
- tapOn:
    text: "Bestätigen"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*Verbindung erfolgreich.*|.*Verbunden.*|.*RealUnit kaufen.*"
    timeout: 60000

# === THE CORE INVARIANT ===
#
# After re-pair, the app MUST be in one of two states:
#   (RESUME) The KYC sign sheet is back up, showing page 4's confirm
#            hint AGAIN. Operator confirms; pages 5..13 complete; final
#            success screen reached. The envelope hash MUST match the
#            M-2 fixture.
#   (RESTART) The app is back on the dashboard / pre-sign screen, no
#             sign in flight. User must re-initiate the sign manually.
#
# It MUST NOT be in:
#   (ZOMBIE) Sign sheet showing a page-N confirm hint but the device
#            never reaches the user; the queued page-5 frame firing
#            against the new session as if old one was still alive;
#            silent success without operator confirmation.
#
# Until the resume-vs-restart-choice widget ships (BL-019), the app's
# observable behaviour today is RESTART. We assert that here; when
# RESUME ships, this assertion strengthens.
- runFlow:
    when:
      visible:
        text: ".*bestätigen Sie.*BitBox.*|.*Anmeldung bestätigen.*"
    commands:
      # RESUME path: the sign came back. Walk through pages 4..13.
      - repeat:
          times: 10
          commands:
            - runFlow:
                when:
                  notVisible:
                    text: ".*abgeschlossen.*"
                commands:
                  - extendedWaitUntil:
                      visible:
                        text: ".*bestätigen Sie.*BitBox.*"
                      timeout: 60000
                  - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: ".*RealUnit kaufen.*"
    commands:
      # RESTART path: the sign was cleanly discarded. Assert no zombie.
      - assertVisible:
          text: ".*RealUnit kaufen.*"

# Either terminal state is acceptable; ZOMBIE would fail the
# extendedWaitUntil above (no terminal state ever reached).
- assertVisible:
    text: ".*abgeschlossen.*|.*RealUnit kaufen.*"
