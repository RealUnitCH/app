name: realunit_wallet
description: "A Wallet to use for Real Unit Investors"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.0.1+2

environment:
  sdk: ">=3.10.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  async: ^2.13.0
  basic_utils: ^5.7.0
  bech32: ^0.2.2
  bip32: ^2.0.0
  bip39: ^1.0.6
  collection: ^1.19.0
  convert: ^3.1.2
  crypto: ^3.0.6
  drift: ^2.32.1
  eth_sig_util_plus: ^0.0.10
  eip7702:
    git:
      url: https://github.com/DFXswiss/eip-7702.git
      ref: e7f7d2f96639583b5166b1172e17739e52e56e9f
  etherscan_api:
    git:
      url: https://github.com/konstantinullrich/etherscan_api
      ref: up-to-date-dependecies
  erc20: ^1.0.1
  equatable: ^2.0.0
  mobile_scanner: ^7.0.1
  fl_chart: 1.0.0
  flutter_bloc: ^9.0.0
  flutter_idensic_mobile_sdk_plugin: ^1.42.0
  image_picker: ^1.1.2
  flutter_inappwebview: ^6.1.5
  flutter_markdown_plus: ^1.0.7
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.1.0
  get_it: ^8.0.3
  go_router: ^14.8.0
  http: ^1.1.0
  intl: any
  local_auth: ^3.0.0
  open_file: ^3.5.11
  path: ^1.9.0
  path_provider: 2.1.5
  pointycastle: ^3.9.1
  qr_flutter: ^4.1.0
  graphql: ^5.2.1
  shared_preferences: ^2.5.2
  sqlite3: ^3.3.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  web3dart: ^2.7.1
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  bitbox_flutter:
    git:
      url: https://github.com/DFXswiss/bitbox_flutter.git
      ref: feature/ios-ble-pairing

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^10.0.0
  build_runner: ^2.13.0
  drift_dev: ^2.32.1

  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  #  web3dart_builders: ^0.1.0

  mocktail: ^1.0.4

dependency_overrides:
  analyzer: ^10.0.0
  collection: 1.19.0
  dart_style: 3.1.5
  web3dart:
    git:
      url: https://github.com/cake-tech/web3dart.git
      ref: cake

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/coins/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/images/splash/
    - assets/legal/

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
        - asset: assets/fonts/Satoshi-Italic.ttf
    - family: Satoshi Variable
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
        - asset: assets/fonts/Satoshi-VariableItalic.ttf
    - family: Satoshi Medium
      fonts:
        - asset: assets/fonts/Satoshi-Medium.ttf
        - asset: assets/fonts/Satoshi-MediumItalic.ttf
    - family: Satoshi Light
      fonts:
        - asset: assets/fonts/Satoshi-Light.ttf
        - asset: assets/fonts/Satoshi-LightItalic.ttf
    - family: Satoshi Bold
      fonts:
        - asset: assets/fonts/Satoshi-Bold.ttf
        - asset: assets/fonts/Satoshi-BoldItalic.ttf
    - family: Satoshi Black
      fonts:
        - asset: assets/fonts/Satoshi-Black.ttf
        - asset: assets/fonts/Satoshi-BlackItalic.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/realunit_wallet_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  image_path_ios: "assets/icons/realunit_wallet_logo_full.png"

# dart run flutter_native_splash:create -p pubspec.yaml
flutter_native_splash:
  web: false
  color: "#42a5f5"
  background_image_android: "assets/images/splash/splash_background.png"
  image: assets/images/splash/splash_background.png
  android_gravity: fill_vertical
  ios_content_mode: scaleAspectFill
  fullscreen: false
  android_12:
    color: "#ffffff"
    image: assets/images/splash/splash_logo.png
